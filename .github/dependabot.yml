version: 2

updates:
  - package-ecosystem: "npm"  # works for Bun projects too
    directory: "/"

    schedule:
      interval: "daily"
      time: "10:00"
      timezone: "Asia/Kolkata"

    open-pull-requests-limit: 1

    groups:
      all-dependencies:
        patterns:
          - "*"

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

    labels:
      - "dependencies"

    rebase-strategy: "auto"