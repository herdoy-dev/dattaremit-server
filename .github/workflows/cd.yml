name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DO_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy files via rsync
        run: |
          rsync -azP --delete \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='tests/' \
            --exclude='.env*' \
            --exclude='generated/' \
            --exclude='coverage/' \
            --exclude='front_end/' \
            --exclude='cf-worker/' \
            --exclude='docs/' \
            --exclude='.DS_Store' \
            --exclude='.idea' \
            --exclude='.claude' \
            --exclude='.agent/' \
            --exclude='.agents/' \
            --exclude='details_for_prod/' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.DO_SSH_USERNAME }}@${{ secrets.DO_SSH_HOST }}:/home/appuser/dattaremit-server/

      - name: Install dependencies and restart
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DO_SSH_USERNAME }}@${{ secrets.DO_SSH_HOST }} << 'ENDSSH'
          set -e
          export PATH="$HOME/.nvm/versions/node/v24.13.1/bin:$PATH"
          cd /home/appuser/dattaremit-server
          bun install --frozen-lockfile
          bunx prisma migrate deploy
          bunx prisma generate
          pm2 restart all --update-env
          ENDSSH
